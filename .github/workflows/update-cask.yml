name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate dispatch payload
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          ARM64_SHA="${{ github.event.client_payload.arm64_sha256 }}"
          if [ -z "$VERSION" ] || [ -z "$ARM64_SHA" ]; then
            echo "::error::Missing required fields in client_payload (version, arm64_sha256)"
            exit 1
          fi
          if ! echo "$ARM64_SHA" | grep -qE '^[a-f0-9]{64}$'; then
            echo "::error::arm64_sha256 is not a valid sha256 hash"
            exit 1
          fi

      - name: Update cask formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          ARM64_SHA="${{ github.event.client_payload.arm64_sha256 }}"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/hyperidle.rb
          sed -i "s/sha256 \".*\"/sha256 \"${ARM64_SHA}\"/" Casks/hyperidle.rb

      - name: Commit and push
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/hyperidle.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update HyperIdle to ${VERSION}"
            git push
          fi
